    <!-- Script ควบคุมการแสดงผลช่อง "อื่นๆ" -->
    <script>
        function toggleOtherEquipment() {
            const eqSelect = document.getElementById("equipment_type");
            const otherDiv = document.getElementById("other_equipment_div");
            const otherInput = document.getElementById("other_equipment_input");
            
            if (eqSelect.value === "อื่นๆ") {
                otherDiv.classList.remove("hidden");
                otherInput.required = true;
            } else {
                otherDiv.classList.add("hidden");
                otherInput.required = false;
                otherInput.value = "";
            }
        }

        function toggleOtherLocation() {
            const locSelect = document.getElementById("location");
            const otherLocDiv = document.getElementById("other_location_div");
            const otherLocInput = document.getElementById("other_location_input");
            
            if (locSelect.value === "ห้องพักอาจารย์" || locSelect.value === "สำนักงานคณะ" || locSelect.value === "อื่นๆ") {
                otherLocDiv.classList.remove("hidden");
                otherLocInput.required = true;
                
                if(locSelect.value === "ห้องพักอาจารย์") {
                    otherLocInput.placeholder = "โปรดระบุเลขห้องพักอาจารย์...";
                } else if(locSelect.value === "สำนักงานคณะ") {
                    otherLocInput.placeholder = "โปรดระบุชื่อฝ่าย/ส่วนงาน...";
                } else {
                    otherLocInput.placeholder = "โปรดระบุสถานที่...";
                }
            } else {
                otherLocDiv.classList.add("hidden");
                otherLocInput.required = false;
                otherLocInput.value = "";
            }
        }
    </script>
