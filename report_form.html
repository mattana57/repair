<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งซ่อมออนไลน์ - MBS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl min-h-screen flex flex-col">
        
        <div class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
            <h1 class="text-2xl font-bold"><i class="fas fa-tools mr-2"></i> แจ้งซ่อมออนไลน์</h1>
            <p class="text-blue-100 text-sm mt-1">คณะการบัญชีและการจัดการ (MBS)</p>
        </div>

        <div class="p-6 flex-1">
            
            <div class="bg-blue-50 rounded-xl p-4 mb-6 flex items-center border border-blue-100">
                <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center overflow-hidden mr-4">
                    <i class="fas fa-user text-gray-400 text-xl"></i>
                    </div>
                <div>
                    <p class="text-xs text-gray-500">ผู้แจ้งซ่อม (ดึงจาก LINE)</p>
                    <p class="text-sm font-bold text-blue-800" id="profileName">กำลังโหลดข้อมูล...</p>
                </div>
            </div>

            <form action="save_repair.php" method="POST" enctype="multipart/form-data" class="space-y-5">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">สิ่งที่ต้องการแจ้งซ่อม <span class="text-red-500">*</span></label>
                    <select name="equipment_type" id="equipment_type" onchange="toggleOtherEquipment()" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                        <option value="">-- เลือกสิ่งที่ชำรุด --</option>
                        <option value="แอร์/เครื่องปรับอากาศ">แอร์ / เครื่องปรับอากาศ</option>
                        <option value="คอมพิวเตอร์/ปริ้นเตอร์">คอมพิวเตอร์ / ปริ้นเตอร์</option>
                        <option value="อินเทอร์เน็ต/เว็บไซต์">อินเทอร์เน็ต / เว็บไซต์</option>
                        <option value="ไฟฟ้า/หลอดไฟ">ไฟฟ้า / หลอดไฟ / ปลั๊ก</option>
                        <option value="ประปา/ห้องน้ำ">ประปา / ห้องน้ำ</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                    
                    <div id="other_equipment_div" class="hidden mt-3">
                        <input type="text" name="other_equipment" id="other_equipment_input" placeholder="โปรดระบุสิ่งที่ต้องการแจ้งซ่อม..." class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">สถานที่ / อาคาร / ห้อง <span class="text-red-500">*</span></label>
                    <select name="location" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                        <option value="">-- เลือกสถานที่ --</option>
                        <optgroup label="อาคารบริหารธุรกิจสิรินธร (ตึก SBB)">
                            <option value="ตึก SBB - ชั้น 1 (สำนักงาน/หอเกียรติยศ)">ชั้น 1 (สำนักงาน/หอเกียรติยศ)</option>
                            <option value="ตึก SBB - ชั้น 2 (สำนักงานคณบดี)">ชั้น 2 (สำนักงานคณบดี)</option>
                            <option value="ตึก SBB - ชั้น 5-10 (ห้องเรียน)">ชั้น 5-10 (ห้องเรียน SBB 501-1007)</option>
                            <option value="ตึก SBB - ชั้น 11 (ห้องอเนกประสงค์)">ชั้น 11 (ห้องอเนกประสงค์)</option>
                        </optgroup>
                        <optgroup label="อาคาร ACC.BIZ">
                            <option value="ตึก ACC.BIZ - ห้องปฏิบัติการคอมพิวเตอร์">ห้องปฏิบัติการคอมพิวเตอร์</option>
                            <option value="ตึก ACC.BIZ - ห้องเรียนทั่วไป">ห้องเรียนทั่วไป</option>
                            <option value="ตึก ACC.BIZ - พื้นที่ใต้อาคาร">พื้นที่ใต้อาคาร / ทำงาน</option>
                        </optgroup>
                        <optgroup label="วิทยาเขตในเมือง">
                            <option value="อาคาร ACC - วิทยาเขตในเมือง">อาคารบริหารธุรกิจ (วิทยาเขตในเมือง)</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">เบอร์โทรศัพท์ติดต่อกลับ <span class="text-red-500">*</span></label>
                    <input type="tel" name="phone_number" placeholder="เช่น 0812345678" class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">อาการเสียเบื้องต้น <span class="text-red-500">*</span></label>
                    <textarea name="problem_desc" rows="3" placeholder="เช่น แอร์น้ำหยด, เปิดคอมไม่ติด..." class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" required></textarea>
                </div>

                <div class="pt-2 pb-8">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-blue-700 transform hover:scale-[1.02] transition-all">
                        <i class="fas fa-paper-plane mr-2"></i> ส่งข้อมูลแจ้งซ่อม
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        function toggleOtherEquipment() {
            const eqSelect = document.getElementById("equipment_type");
            const otherDiv = document.getElementById("other_equipment_div");
            const otherInput = document.getElementById("other_equipment_input");
            
            if (eqSelect.value === "อื่นๆ") {
                otherDiv.classList.remove("hidden");
                otherInput.required = true;
            } else {
                otherDiv.classList.add("hidden");
                otherInput.required = false;
                otherInput.value = "";
            }
        }
    </script>
</body>
</html>
